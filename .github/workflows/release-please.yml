# Automated release cadence. Watches conventional commits on main and maintains
# a "release PR" that bumps the version and updates the changelog. Merging that
# PR tags a new version and cuts a GitHub Release — which triggers publish.yml
# to publish to npm. Result: merge features/fixes, merge the release PR, shipped.
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
